<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taha Rest Plan</title>

<link rel="manifest" href="manifest.json">

<style>
body{font-family:tahoma;direction:rtl;margin:0;background:#eef2f7}
header{background:#0b2a3d;color:#fff;text-align:center;padding:15px}
.container{padding:10px;max-width:900px;margin:auto}
.card{background:#fff;padding:10px;margin-top:10px;border-radius:10px}
input,button{width:100%;padding:10px;margin-top:6px;border-radius:8px;border:1px solid #ccc}
button{background:#0b2a3d;color:#fff;border:none}
.person{display:flex;justify-content:space-between;padding:6px;border-bottom:1px solid #eee}
.dashboard{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.box{background:#fff;padding:10px;text-align:center;border-radius:10px}
.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.day{background:#ddd;padding:10px;text-align:center;border-radius:6px;cursor:pointer;font-size:12px}
.day.active{background:#0b2a3d;color:#fff}
</style>
</head>

<body>

<header>📊 Taha Rest Plan</header>

<div class="container">

<div class="dashboard">
<div class="box"><div id="total">0</div><small>کل</small></div>
<div class="box"><div id="p">0</div><small>حاضر</small></div>
<div class="box"><div id="a">0</div><small>مرخصی</small></div>
<div class="box"><div id="o">0</div><small>استراحت</small></div>
</div>

<div class="card">
<h3>👷 افزودن نیرو</h3>
<input id="n1" placeholder="نام">
<input id="n2" placeholder="فامیل">
<button onclick="add()">ثبت</button>
</div>

<div class="card">
<h3>📅 وضعیت روز</h3>
<div id="sel"></div>
<button onclick="set('present')">🟢 حضور</button>
<button onclick="set('absent')">🔴 مرخصی</button>
<button onclick="set('off')">🟡 استراحت</button>
</div>

<div class="card">
<h3>👷 لیست</h3>
<div id="list"></div>
</div>

<div class="card">
<h3>📅 تقویم</h3>
<div class="calendar" id="cal"></div>
</div>

</div>

<script>
let people = JSON.parse(localStorage.getItem("people")||"[]");
let data = JSON.parse(localStorage.getItem("data")||"{}");
let selected = new Date().toISOString().split("T")[0];

function save(){
localStorage.setItem("people",JSON.stringify(people));
localStorage.setItem("data",JSON.stringify(data));
}

function add(){
let a=document.getElementById("n1").value;
let b=document.getElementById("n2").value;
if(!a||!b)return;
people.push({a,b});
save();render();
}

function set(st){
people.forEach(p=>{
let k=p.a+" "+p.b;
if(!data[k])data[k]={};
data[k][selected]=st;
});
save();render();
}

function setDay(d){selected=d;render();}

function render(){
document.getElementById("sel").innerText="روز: "+selected;

let l=document.getElementById("list");
l.innerHTML="";

let p=0,a=0,o=0;

people.forEach(x=>{
let k=x.a+" "+x.b;
let s=data[k]?.[selected]||"—";
l.innerHTML+=`<div class="person"><div>${k}</div><div>${s}</div></div>`;
if(s==="present")p++;
if(s==="absent")a++;
if(s==="off")o++;
});

document.getElementById("total").innerText=people.length;
document.getElementById("p").innerText=p;
document.getElementById("a").innerText=a;
document.getElementById("o").innerText=o;

let c=document.getElementById("cal");
c.innerHTML="";
let d=new Date();
let y=d.getFullYear(),m=d.getMonth();
let days=new Date(y,m+1,0).getDate();

for(let i=1;i<=days;i++){
let date=`${y}-${String(m+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
let div=document.createElement("div");
div.className="day";
div.innerText=i;
if(date===selected)div.classList.add("active");
div.onclick=()=>setDay(date);
c.appendChild(div);
}
}

render();

/* PWA */
if('serviceWorker' in navigator){
navigator.serviceWorker.register('service-worker.js');
}
</script>

</body>
</html>
